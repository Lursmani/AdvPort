name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: npm ci/build run third-party code; the default GITHUB_TOKEN
# scopes can include write access.
permissions:
  contents: read

# Cancel superseded runs on the same ref instead of letting them finish.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml

  e2e:
    needs: [lint, test]
    uses: ./.github/workflows/e2e.yml
